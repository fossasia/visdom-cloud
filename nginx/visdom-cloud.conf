worker_processes 1;

events {
    worker_connections 1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream console_frontend {
        server 127.0.0.1:5173;
    }

    upstream console_gateway {
        server 127.0.0.1:8085;
    }

    upstream visdom_server {
        server 127.0.0.1:8097;
    }

    server {
        listen 8080;
        server_name localhost;

        location /api/v1/ {
            proxy_pass http://console_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /_auth_verify {
            internal;
            proxy_pass http://console_gateway/api/v1/auth/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
        }

        location /vis/ {
            auth_request /_auth_verify;
            error_page 401 = @auth_redirect;

            proxy_pass http://visdom_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location @auth_redirect {
            return 302 /login?next=$request_uri;
        }

        location / {
            proxy_pass http://console_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
